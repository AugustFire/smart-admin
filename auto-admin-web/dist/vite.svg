<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 外圆 -->
  <circle cx="128" cy="128" r="120" fill="url(#grad1)" opacity="0.15"/>
  <!-- 六边形外框 -->
  <path d="M128 28 L208 74 L208 182 L128 228 L48 182 L48 74 Z" fill="none" stroke="url(#grad1)" stroke-width="8"/>
  <!-- 内部智能图标 - 大脑/电路图案 -->
  <g transform="translate(128, 128)">
    <!-- 中心节点 -->
    <circle cx="0" cy="0" r="16" fill="url(#grad1)"/>
    <!-- 连接线和节点 -->
    <line x1="0" y1="0" x2="-35" y2="-25" stroke="url(#grad2)" stroke-width="3"/>
    <circle cx="-35" cy="-25" r="8" fill="url(#grad2)"/>
    <line x1="0" y1="0" x2="35" y2="-25" stroke="url(#grad2)" stroke-width="3"/>
    <circle cx="35" cy="-25" r="8" fill="url(#grad2)"/>
    <line x1="0" y1="0" x2="-40" y2="20" stroke="url(#grad2)" stroke-width="3"/>
    <circle cx="-40" cy="20" r="8" fill="url(#grad2)"/>
    <line x1="0" y1="0" x2="40" y2="20" stroke="url(#grad2)" stroke-width="3"/>
    <circle cx="40" cy="20" r="8" fill="url(#grad2)"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="url(#grad2)" stroke-width="3"/>
    <circle cx="0" cy="-45" r="8" fill="url(#grad2)"/>
    <!-- 外圈装饰 -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  </g>
  <!-- 顶部装饰弧线 -->
  <path d="M68 68 Q128 38 188 68" fill="none" stroke="url(#grad2)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>
