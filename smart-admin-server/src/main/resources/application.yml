server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: Smart Admin
  datasource:
    url: jdbc:mysql://localhost:3306/smart_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smartadmin.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: smart-admin-secret-key-2024-change-this-in-production
  expiration: 7200000  # 2 小时 (毫秒)
  header: Authorization
  prefix: Bearer

# AI 服务配置
ai:
  base-url: http://localhost:8000
  connect-timeout: 10000
  read-timeout: 60000

# Knife4j/Swagger 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-sort: true

# 日志配置
logging:
  charset:
    console: UTF-8
    file: UTF-8